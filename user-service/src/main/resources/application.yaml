server:
  port: 8081
jwt:
  secret: ${JWT_SECRET_KEY}
  expiration-ms: 86400000
spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true